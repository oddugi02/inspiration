<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>영감 | 방구석에서 찾기</title>
    
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="style.css">

<body>
    <main class="container subpage-container inside-container">

        <nav class="actions">

            <button class="btn btn-action" onclick="location.href='knowledge.html'">

        </nav>

        <div class="nav-back">
            <button class="btn-text" onclick="location.href='index.html'">
