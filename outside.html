<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영감 | 밖에서 찾기</title>
    
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="header">
            <h1 class="title">밖에서 영감 얻기</h1>
            <p class="subtitle">새로운 공간과 시각으로 감각을 깨워보세요</p>
        </header>

        <nav class="actions">
            <button class="btn btn-action" onclick="location.href='exhibitions.html'">
                <i class="ph-thin ph-paint-brush-broad"></i>
                <span>전시 탐색</span>
                <i class="ph-thin ph-caret-right mini-icon"></i>
            </button>
            <button class="btn btn-action" onclick="location.href='places.html'">
                <i class="ph-thin ph-map-pin"></i>
                <span>장소 탐색</span>
                <i class="ph-thin ph-caret-right mini-icon"></i>
            </button>
            <button class="btn btn-action" onclick="location.href='books.html'">
                <i class="ph-thin ph-book-open"></i>
                <span>도서</span>
                <i class="ph-thin ph-caret-right mini-icon"></i>
            </button>
        </nav>

        <div class="nav-back">
            <button class="btn-text" onclick="location.href='index.html'">
                <i class="ph-thin ph-arrow-left"></i>
                <span>돌아가기</span>
            </button>
        </div>
    </main>


    <script src="main.js"></script>
</body>
</html>
